<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar racha | Racha Ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260523-drawsizev0">
  </head>
  <body>
    <main class="signup-flow-shell">
      <a class="icon-back-link" href="/" aria-label="Voltar para a home">‹</a>

      <section class="flow-header">
        <span class="payment-eyebrow">Organizador</span>
        <h1>CRIAR RACHA</h1>
        <p>Preencha os dados do racha e crie o acesso seguro do organizador.</p>
      </section>

      <section class="signup-card flow-card">
        <form id="organizer-form">
          <div class="organizer-step" data-organizer-step="1">
            <label>Nome do Evento <input name="title" required placeholder="Evento de Sabado"></label>
            <label>Nome do organizador <input name="organizerName" required placeholder="Nome & Sobrenome"></label>
            <label>Telefone do organizador <input name="organizerPhone" autocomplete="tel" required placeholder="(00) 00000-0000"></label>
            <div class="sport-choice" role="group" aria-label="Tipo de racha">
              <label>
                <input type="radio" name="sport" value="futebol" checked>
                <span>FUTEBOL</span>
              </label>
              <label>
                <input type="radio" name="sport" value="volei">
                <span>VOLEI</span>
              </label>
            </div>
            <div class="form-split">
              <label>Data <input name="date" type="date" required></label>
              <label>Hora <input name="time" type="time" required></label>
            </div>
            <label>Jogadores <input name="capacity" type="number" min="1" value="12" required></label>
            <label>Local <input name="location" required placeholder="Ex: Arena Society"></label>
            <div class="form-split">
              <label>Valor por jogador (R$) <input name="price" type="number" min="0" step="0.01" value="0"></label>
              <label>Valor Total (R$) <input name="totalPrice" type="number" min="0" step="0.01" value="0"></label>
            </div>
            <label>Chave Pix para receber <input name="pixKey" required></label>
            <label>Observacoes <textarea name="notes" rows="3" placeholder="Ex: Levar camisa clara e escura."></textarea></label>
            <label class="check-row">
              <input name="requireProof" type="checkbox" checked>
              <span>Exigir comprovante Pix?</span>
            </label>
            <button type="button" id="organizer-next-button">CONTINUAR</button>
          </div>

          <div class="organizer-step hidden" data-organizer-step="2">
            <span class="payment-eyebrow">Acesso seguro</span>
            <h2>DEFINA SUA SENHA</h2>
            <p class="muted">Ela sera usada para acessar o painel administrativo deste racha.</p>
            <label>Senha <input name="password" type="password" autocomplete="new-password" minlength="8"></label>
            <label>Confirmar senha <input name="confirmPassword" type="password" autocomplete="new-password" minlength="8"></label>
            <div class="password-rules" id="password-rules" aria-live="polite">
              <strong>Requisitos pendentes</strong>
              <ul></ul>
            </div>
            <div class="modal-actions">
              <button type="button" id="organizer-prev-button" class="secondary-button">VOLTAR</button>
              <button type="submit">PUBLICAR RACHA</button>
            </div>
          </div>
          <p id="organizer-message" class="form-message" role="status"></p>
        </form>
      </section>
    </main>

  <script src="/organizar.js?v=20260523-drawsizev0"></script>
  </body>
</html>
