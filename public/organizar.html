<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar racha | Racha Ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260523-v0">
  </head>
  <body>
    <main class="signup-flow-shell">
      <a class="icon-back-link" href="/" aria-label="Voltar para a home">‹</a>

      <section class="flow-header">
        <span class="payment-eyebrow">Organizador</span>
        <h1>CRIAR RACHA</h1>
        <p>Preencha os dados do racha e publique para receber inscricoes.</p>
      </section>

      <section class="signup-card flow-card">
        <form id="organizer-form">
          <label>Nome da pelada <input name="title" required placeholder="Ex: Volei de sabado"></label>
          <label>Nome do organizador <input name="organizerName" required placeholder="Ex: Carlos Eduardo"></label>
          <label>Telefone do organizador <input name="organizerPhone" autocomplete="tel" placeholder="(00) 00000-0000"></label>
          <div class="sport-choice" role="group" aria-label="Tipo de racha">
            <label>
              <input type="radio" name="sport" value="futebol" checked>
              <span>FUTEBOL</span>
            </label>
            <label>
              <input type="radio" name="sport" value="volei">
              <span>VOLEI</span>
            </label>
          </div>
          <div class="form-split">
            <label>Data <input name="date" type="date" required></label>
            <label>Hora <input name="time" type="time" required></label>
          </div>
          <label>Jogadores <input name="capacity" type="number" min="1" value="12" required></label>
          <label>Local <input name="location" required placeholder="Ex: Arena Society"></label>
          <label>Valor por jogador (R$) <input name="price" type="number" min="0" step="0.01" value="0"></label>
          <label>Chave Pix para receber <input name="pixKey" required value="edcdesigner@hotmail.com"></label>
          <label>Observacoes <textarea name="notes" rows="3" placeholder="Ex: Levar camisa clara e escura."></textarea></label>
          <label class="check-row">
            <input name="requireProof" type="checkbox" checked>
            <span>Exigir comprovante Pix?</span>
          </label>
          <button type="submit">PUBLICAR RACHA</button>
          <p id="organizer-message" class="form-message" role="status"></p>
        </form>
      </section>
    </main>

    <script src="/organizar.js?v=20260523-v0"></script>
  </body>
</html>
